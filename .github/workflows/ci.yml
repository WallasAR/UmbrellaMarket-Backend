name: Backend CI

on:
  push:
    branches: [main, master, develop, 'feature/**', 'fix/**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          find src -name '*.js' -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done
